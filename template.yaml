AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: File upload request API with Lambda, API Gateway, DynamoDB, and S3

Parameters:
  UploadBucketName:
    Type: String
    Default: handson-fileups3-javasdk-992382700208-ap-northeast-1-an
  RequestsTableName:
    Type: String
    Default: requests

Globals:
  Function:
    Runtime: java21
    MemorySize: 512
    Timeout: 15
    Tracing: Active
    Environment:
      Variables:
        REQUESTS_TABLE_NAME: !Ref RequestsTableName
        UPLOAD_BUCKET_NAME: !Ref UploadBucketName
        DDB_ENDPOINT: ""
        S3_ENDPOINT: ""
        DDB_REGION: ""
        S3_REGION: ""

Resources:
  FileUpApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: fileup-request-api
      StageName: Prod
      EndpointConfiguration:
        Type: REGIONAL
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

  RequestApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: fileup-request-api
      CodeUri: .
      Handler: com.example.fileupapi.handler.RequestApiHandler::handleRequest
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RequestsTableName
        - S3WritePolicy:
            BucketName: !Ref UploadBucketName
      Events:
        CreateRequest:
          Type: Api
          Properties:
            RestApiId: !Ref FileUpApi
            Path: /requests
            Method: POST
        ListRequests:
          Type: Api
          Properties:
            RestApiId: !Ref FileUpApi
            Path: /requests
            Method: GET
        GetRequest:
          Type: Api
          Properties:
            RestApiId: !Ref FileUpApi
            Path: /requests/{id}
            Method: GET
    Metadata:
      BuildMethod: java21

  RequestStatusUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: fileup-request-status-update
      CodeUri: .
      Handler: com.example.fileupapi.handler.RequestStatusUpdateHandler::handleRequest
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref RequestsTableName
      Events:
        S3ObjectCreatedEvent:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.s3
              detail-type:
                - Object Created
              detail:
                bucket:
                  name:
                    - !Ref UploadBucketName
    Metadata:
      BuildMethod: java21

Outputs:
  ApiBaseUrl:
    Description: Base URL for the deployed API
    Value: !Sub "https://${FileUpApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"

  RequestsTableName:
    Description: DynamoDB table name
    Value: !Ref RequestsTableName

  UploadBucketName:
    Description: S3 bucket name
    Value: !Ref UploadBucketName
